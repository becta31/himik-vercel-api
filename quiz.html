<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина - HIMIK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent-blue: #00d4ff;
            --accent-green: #4ecdc4;
            --accent-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background-color: var(--secondary-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="w-full max-w-xl">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-accent-blue to-accent-green mb-4">
                <a href="index.html">HIMIK Викторина</a>
            </h1>
            <p class="text-gray-400">Проверьте свои знания о химических элементах!</p>
        </header>

        <div id="questionCard" class="card p-8">
            <div class="flex justify-between items-start mb-6 border-b border-gray-700 pb-3">
                <p class="text-md text-gray-400">
                    Лучший счет: <span id="highScore" class="font-extrabold text-accent-orange">0</span>
                </p>
                <p class="text-xl font-semibold">
                    Счет: <span id="scoreValue" class="text-accent-green">0</span>
                </p>
            </div>

            <p id="questionNumber" class="text-lg text-gray-400 mb-4">Вопрос 1 из X</p>
            <p id="questionText" class="text-2xl font-semibold mb-6"></p>

            <input type="text" id="answerInput" placeholder="Ваш ответ..."
                   class="w-full p-3 rounded-lg bg-primary-bg text-white border border-gray-600 focus:border-accent-blue focus:ring focus:ring-accent-blue/50 mb-4"
                   autofocus>

            <p id="feedback" class="text-center font-bold mb-4 h-6"></p>

            <button id="checkButton" onclick="checkAnswer()"
                    class="w-full px-4 py-3 bg-accent-blue text-white rounded-lg text-lg font-bold hover:bg-opacity-80 transition-colors">
                Проверить
            </button>
        </div>

        <div id="resultsCard" class="card p-8 text-center hidden">
            <h2 class="text-3xl font-bold mb-6 text-accent-orange">Викторина завершена!</h2>

            <div class="space-y-3 mb-8">
                <p class="text-2xl text-accent-green font-bold">
                    Ваш результат: <span id="finalScore" class="text-3xl">0</span>
                </p>
                <p class="text-xl text-accent-orange font-bold border-t border-gray-700 pt-3">
                    Лучший результат: <span id="newHighScore">0</span>
                </p>
            </div>

            <button onclick="restartQuiz()"
                    class="w-full px-4 py-3 bg-accent-green text-white rounded-lg text-lg font-bold hover:bg-opacity-80 transition-colors">
                Начать заново
            </button>
            <a href="index.html" class="block mt-4 text-gray-400 hover:text-white transition-colors">
                ← Вернуться на главную
            </a>
        </div>
    </div>

    <script>
        let elements = [];
        let currentElementIndex = 0;
        let score = 0;
        let currentQuestionType = '';

        // ==========================================================
        // КОД ДЛЯ ПРОГРЕССА (Local Storage)
        // ==========================================================

        function saveScore(newScore) {
            const currentHighScore = loadHighScore();
            if (newScore > currentHighScore) {
                localStorage.setItem('himikHighScore', newScore);
                return newScore;
            }
            return currentHighScore;
        }

        function loadHighScore() {
            return parseInt(localStorage.getItem('himikHighScore')) || 0;
        }

        function displayHighScore() {
            const highScoreElement = document.getElementById('highScore');
            if (highScoreElement) {
                highScoreElement.textContent = loadHighScore();
            }
        }

        // ==========================================================
        // ОСНОВНЫЕ ФУНКЦИИ ВИКТОРИНЫ
        // ==========================================================

        function loadElements() {
            fetch('elements.json')
                .then(response => response.json())
                .then(data => {
                    elements = data;
                    startQuiz();
                })
                .catch(error => console.error('Ошибка загрузки элементов:', error));
        }

        function startQuiz() {
            score = 0;
            currentElementIndex = 0;
            shuffleArray(elements);
            displayHighScore(); // Отображаем лучший счет при старте
            nextQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function nextQuestion() {
            if (currentElementIndex >= elements.length) {
                showResults();
                return;
            }

            const element = elements[currentElementIndex];
            const answerInput = document.getElementById('answerInput');

            // Сбрасываем UI
            answerInput.value = '';
            answerInput.disabled = false;
            document.getElementById('feedback').textContent = '';
            document.getElementById('checkButton').disabled = false;

            // Случайный выбор типа вопроса
            const questionTypes = ['symbol', 'name_ru', 'atomic_number'];
            currentQuestionType = questionTypes[Math.floor(Math.random() * questionTypes.length)];

            let questionText;
            switch (currentQuestionType) {
                case 'symbol':
                    questionText = `Какой <b>символ</b> у элемента: ${element.name_ru}?`;
                    break;
                case 'name_ru':
                    questionText = `Как называется элемент с символом <b>${element.symbol}</b>?`;
                    break;
                case 'atomic_number':
                    questionText = `Какой <b>атомный номер</b> у элемента: ${element.name_ru}?`;
                    break;
            }

            document.getElementById('questionText').innerHTML = questionText;
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('questionNumber').textContent = `Вопрос ${currentElementIndex + 1} из ${elements.length}`;
            answerInput.focus();
        }

        function checkAnswer() {
            const element = elements[currentElementIndex];
            const answerInput = document.getElementById('answerInput');
            const feedback = document.getElementById('feedback');
            const userAnswer = answerInput.value.trim().toLowerCase();
            let correctAnswer;
            let isCorrect = false;

            switch (currentQuestionType) {
                case 'symbol':
                    correctAnswer = element.symbol.toLowerCase();
                    isCorrect = userAnswer === correctAnswer;
                    break;
                case 'name_ru':
                    correctAnswer = element.name_ru.toLowerCase();
                    isCorrect = userAnswer === correctAnswer;
                    break;
                case 'atomic_number':
                    correctAnswer = element.atomic_number.toString();
                    isCorrect = userAnswer === correctAnswer;
                    break;
            }

            if (isCorrect) {
                feedback.textContent = `✅ Правильно! Это ${element.name_ru}.`;
                feedback.className = 'text-green-400 font-bold';
                score++;
                document.getElementById('scoreValue').textContent = score;
            } else {
                feedback.textContent = `❌ Ошибка. Правильный ответ: ${correctAnswer}.`;
                feedback.className = 'text-red-400 font-bold';
            }

            answerInput.disabled = true;
            document.getElementById('checkButton').disabled = true;

            setTimeout(() => {
                currentElementIndex++;
                nextQuestion();
            }, 1500);
        }

        function showResults() {
            document.getElementById('questionCard').classList.add('hidden');
            const resultsCard = document.getElementById('resultsCard');
            resultsCard.classList.remove('hidden');

            // Сохранение и отображение лучшего счета
            const previousHighScore = loadHighScore();
            const newHighScore = saveScore(score);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('newHighScore').textContent = newHighScore;

            // Сообщение о прогрессе
            let message;
            if (score === elements.length) {
                message = 'Идеальный результат! Вы настоящий химик! 🥇';
            } else if (score === newHighScore && score > previousHighScore) {
                message = '🥳 Новый Лучший Результат! Поздравляем!';
            } else if (score > elements.length * 0.7) {
                message = 'Отличный результат! Продолжайте в том же духе. ✨';
            } else {
                message = 'Неплохо, но есть куда расти. Не сдавайтесь! 💪';
            }

            // Удаляем старое сообщение, если оно есть
            const oldMessage = resultsCard.querySelector('.result-message');
            if (oldMessage) {
                oldMessage.remove();
            }

            const messageElement = document.createElement('p');
            messageElement.className = 'result-message text-lg text-gray-300 mb-6';
            messageElement.textContent = message;

            // Вставляем сообщение после заголовка, но перед блоком с результатами
            const heading = resultsCard.querySelector('h2');
            resultsCard.insertBefore(messageElement, heading.nextSibling);
        }

        function restartQuiz() {
            document.getElementById('resultsCard').classList.add('hidden');
            document.getElementById('questionCard').classList.remove('hidden');
            startQuiz();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            loadElements();

            // Назначаем обработчик на кнопку Enter для ввода ответа
            document.getElementById('answerInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.target.disabled) {
                    checkAnswer();
                }
            });
        });
    </script>
</body>
</html>
