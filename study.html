<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Режим обучения - HIMIK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent-blue: #00d4ff;
            --accent-green: #4ecdc4; /* Цвет для акцента и описания */
            --accent-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .periodic-grid {
            display: grid;
            /* 18 колонок для Периодической таблицы */
            grid-template-columns: repeat(18, minmax(0, 1fr));
            gap: 4px;
            padding: 10px;
        }

        /* Общие стили карточек элементов */
        .element-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 4px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease-in-out;
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            min-height: 90px;
        }

        /* Эффект при наведении */
        .element-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.5);
        }

        /* Модальное окно */
        .modal-content {
            background-color: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ========================================================== */
        /* ЦВЕТА КАТЕГОРИЙ */
        /* ========================================================== */
        .category-nonmetal { border-left-color: #4CAF50; }
        .category-noble-gas { border-left-color: #00BCD4; }
        .category-alkali-metal { border-left-color: #FF9800; }
        .category-alkaline-earth-metal { border-left-color: #FFEB3B; }
        .category-transition-metal { border-left-color: #673AB7; }
        .category-post-transition-metal { border-left-color: #F44336; }
        .category-halogen { border-left-color: #009688; }
        .category-lanthanide { border-left-color: #E91E63; }
        .category-actinide { border-left-color: #795548; }
        .category-metalloid { border-left-color: #2196F3; }
        .category-unknown { border-left-color: #757575; }

        /* ---------------------------------------------------------- */
        /* НОВЫЙ СТИЛЬ: для выделения описания в модальном окне */
        .modal-description-text {
            color: var(--accent-green); /* Ярко-зеленый акцент */
            font-size: 1.125rem; /* Размер шрифта 18px */
            font-weight: 500;
            font-style: italic;
        }
        /* ---------------------------------------------------------- */

        /* Адаптивность для больших таблиц */
        @media (max-width: 1200px) {
            .periodic-grid {
                overflow-x: scroll;
                width: 100%;
                min-width: 1200px;
            }
        }
    </style>
</head>
<body class="p-4">
    <header class="mb-8">
        <nav class="flex justify-between items-center pb-4 border-b border-gray-700">
            <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-accent-blue to-accent-green">
                <a href="index.html">HIMIK</a>
            </h1>
            <a href="quiz.html" class="px-4 py-2 bg-accent-orange text-white rounded-lg hover:bg-opacity-80 transition-colors">
                Режим Викторины →
            </a>
        </nav>
        <h2 class="text-3xl font-semibold text-center mt-6 text-gray-200">Периодическая Таблица Элементов</h2>
    </header>

    <div class="max-w-xl mx-auto mb-6">
        <input type="text" id="searchInput" placeholder="Поиск по имени, символу или номеру..."
               class="w-full p-3 rounded-lg bg-secondary-bg text-white border border-gray-600 focus:border-accent-blue focus:ring focus:ring-accent-blue/50"
               onfocus="this.placeholder='Например: Кислород, Fe, 26'">
    </div>

    <div id="periodicTable" class="periodic-grid mx-auto">
        </div>

    <div id="elementModal" class="fixed inset-0 bg-black bg-opacity-70 hidden justify-center items-center z-50" onclick="closeModal()">
        <div class="modal-content w-11/12 max-w-lg p-6 rounded-xl shadow-2xl relative" onclick="event.stopPropagation()">
            <h3 id="modalName" class="text-4xl font-bold mb-2 text-accent-blue"></h3>
            <p id="modalSymbol" class="text-6xl font-extrabold mb-4"></p>

            <div class="space-y-3 text-lg">
                <p><strong>Атомный номер:</strong> <span id="modalNumber" class="font-mono"></span></p>
                <p><strong>Масса:</strong> <span id="modalMass" class="font-mono"></span></p>
                <p><strong>Период:</strong> <span id="modalPeriod"></span></p>
                <p><strong>Группа:</strong> <span id="modalGroup"></span></p>
                <p><strong>Конфигурация:</strong> <span id="modalConfig" class="font-mono text-accent-green"></span></p>
                <p><strong>Категория:</strong> <span id="modalCategory"></span></p>

                <p class="mt-4 border-t border-gray-700 pt-4">
                    <strong>Описание:</strong> <span id="modalDescription" class="modal-description-text"></span>
                </p>
            </div>

            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors text-2xl">
                &times;
            </button>
        </div>
    </div>

    <script>
        let elements = [];
        let filteredElements = [];

        // Функция загрузки элементов
        function loadElements() {
            fetch('elements.json')
                .then(response => response.json())
                .then(data => {
                    elements = data;
                    filteredElements = data;
                    renderTable(elements);
                })
                .catch(error => {
                    console.error('Ошибка загрузки элементов:', error);
                    document.getElementById('periodicTable').innerHTML = '<p class="text-center text-red-500">Не удалось загрузить данные об элементах. Проверьте elements.json.</p>';
                });
        }

        // Функция рендеринга таблицы
        function renderTable(elementsToRender) {
            const tableContainer = document.getElementById('periodicTable');
            tableContainer.innerHTML = '';

            elementsToRender.forEach(element => {
                const elementCard = document.createElement('div');

                // 1. Логика цветового кодирования:
                const categoryClassName = `category-${element.category.replace(/_/g, '-')}`;

                // 2. Добавление всех классов
                elementCard.className = `element-card p-2 text-center text-white ${categoryClassName}`;

                elementCard.onclick = () => openModal(element);

                // 3. Содержимое карточки
                elementCard.innerHTML = `
                    <div class="element-number text-xs text-gray-400">${element.atomic_number}</div>
                    <div class="element-symbol text-3xl font-bold">${element.symbol}</div>
                    <div class="element-mass text-xs text-gray-400">${element.mass}</div>
                    <div class="element-name text-xs">${element.name_ru}</div>
                `;

                // 4. Логика позиционирования в сетке
                let gridRow = element.period;
                let gridColumn = element.group;

                // Корректировка позиционирования f-элементов
                if (element.category === 'lanthanide') {
                    gridRow = 8;
                    gridColumn = element.atomic_number - 54 + 2;
                } else if (element.category === 'actinide') {
                    gridRow = 9;
                    gridColumn = element.atomic_number - 86 + 2;
                }

                // Проверка на корректность данных
                if (gridRow > 0 && gridColumn > 0) {
                    elementCard.style.gridRow = gridRow;
                    elementCard.style.gridColumn = gridColumn;
                    tableContainer.appendChild(elementCard);
                }
            });
        }

        // Функция поиска элементов
        function searchElements(event) {
            const searchTerm = event.target.value.toLowerCase();
            const results = elements.filter(element => {
                return element.name_ru.toLowerCase().includes(searchTerm) ||
                       element.symbol.toLowerCase().includes(searchTerm) ||
                       element.atomic_number.toString().includes(searchTerm);
            });
            renderTable(results);
        }

        // Открытие модального окна
        function openModal(element) {
            document.getElementById('modalName').textContent = element.name_ru;
            document.getElementById('modalSymbol').textContent = element.symbol;
            document.getElementById('modalNumber').textContent = element.atomic_number;
            document.getElementById('modalMass').textContent = element.mass;
            document.getElementById('modalPeriod').textContent = element.period;
            document.getElementById('modalGroup').textContent = element.group;
            document.getElementById('modalConfig').textContent = element.electron_configuration;
            document.getElementById('modalCategory').textContent = element.category.replace(/_/g, ' '); 
            document.getElementById('modalDescription').textContent = element.description;

            document.getElementById('elementModal').classList.remove('hidden');
            document.getElementById('elementModal').classList.add('flex');
        }

        // Закрытие модального окна
        function closeModal() {
            document.getElementById('elementModal').classList.add('hidden');
            document.getElementById('elementModal').classList.remove('flex');
        }

        // Инициализация и слушатели событий
        document.addEventListener('DOMContentLoaded', function() {
            loadElements();
            document.getElementById('searchInput').addEventListener('input', searchElements);
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
            
            document.getElementById('elementModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
